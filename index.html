<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta property="og:title" content="두더지 잡기">
<meta property="og:description" content="10초안에 10마리를 잡아보자">
<meta property="og:image" content="https://raw.githubusercontent.com/H-lemon-1010/game000/main/thumb.png">
<title>두더지 잡기 게임</title>
<style>
body {
    text-align: center;
    font-family: sans-serif;
    background: #f0f0f0;
}
h2 {
    margin-top: 20px;
}
#game {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
}
.hole {
    width: 100px;
    height: 100px;
    background: #ccc;
    border-radius: 10px;
    cursor: pointer;
}
.active {
    background: brown;
}
button {
    margin-top: 20px;
    padding: 10px 20px;
}
</style>
</head>

<body>

<h2>🐹 두더지 잡기!</h2>
<p>점수: <span id="score">0</span></p>
<p id="time">남은 시간: 10</p>

<div id="game"></div>

<button onclick="startGame()">시작</button>

<script>
let score = 0;
let time = 10;
let current = -1;
let timer;
let moleTimer;

const game = document.getElementById("game");

for(let i=0;i<9;i++){
    const div = document.createElement("div");
    div.classList.add("hole");
    div.onclick = ()=>hit(i);
    game.appendChild(div);
}

function startGame(){
    score = 0;
    time = 10;
    document.getElementById("score").innerText = score;
    document.getElementById("time").innerText = "남은 시간: " + time;

    timer = setInterval(()=>{
        time--;
        document.getElementById("time").innerText = "남은 시간: " + time;

        if(time <= 0){
            clearInterval(timer);
            clearInterval(moleTimer);
            alert("끝! 점수: " + score);
        }
    },1000);

    moleTimer = setInterval(showMole, 1000);
}

function showMole(){
    const holes = document.querySelectorAll(".hole");
    holes.forEach(h=>h.classList.remove("active"));

    current = Math.floor(Math.random()*9);
    holes[current].classList.add("active");
}

function hit(i){
    if(i === current){
        score++;
        document.getElementById("score").innerText = score;
    }
}
</script>

</body>
</html>
